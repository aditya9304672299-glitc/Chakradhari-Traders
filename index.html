<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakradhari Traders - Bihar</title>
    <style>
        :root { --primary: #d32f2f; --dark: #1a1a1a; --grey: #2d2d2d; --light: #f5f5f5; --steel: #4682B4; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { background-color: var(--dark); color: var(--light); padding: 20px; user-select: none; -webkit-user-select: none; transition: filter 0.3s; }
        header { text-align: center; padding: 30px; background: var(--grey); border-radius: 12px; margin-bottom: 25px; border-bottom: 5px solid var(--primary); }
        header h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; }
        .info-bar { background: var(--grey); padding: 15px; border-radius: 8px; margin-bottom: 25px; display: flex; flex-wrap: wrap; justify-content: space-around; font-size: 0.9rem; border: 1px solid #444; }
        .info-bar a { color: #4caf50; text-decoration: none; font-weight: bold; }
        
        .login-container { max-width: 450px; margin: 80px auto; background: var(--grey); padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); text-align: center; border: 1px solid #444; }
        .login-container h2 { margin-bottom: 20px; color: var(--primary); }
        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #555; color: white; border-radius: 6px; font-size: 1rem; }
        button { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #b71c1c; }
        
        .main-content { display: none; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--grey); color: white; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: auto; margin: 0; }
        .tab-btn.active { background: var(--primary); }
        
        .controls { background: var(--grey); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .img-card { background: var(--grey); border-radius: 8px; overflow: hidden; border: 1px solid #444; position: relative; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        
        .img-card img { width: 100%; height: 250px; object-fit: cover; transition: 0.5s; cursor: pointer; pointer-events: auto; }
        .img-card-body { padding: 15px; text-align: center; }
        
        .owner-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-replace { background: #2196F3; }
        .btn-delete { background: #f44336; }
        
        .khata-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .khata-list { background: var(--grey); padding: 20px; border-radius: 8px; height: 650px; overflow-y: auto; position: relative; }
        .khata-item { background: #222; padding: 15px; border-radius: 6px; margin-bottom: 12px; border-left: 5px solid var(--primary); position: relative; }
        .del-entry-btn { background: #f44336; padding: 5px 10px; font-size: 0.8rem; width: auto; position: absolute; top: 15px; right: 15px; }
        
        .logout-btn { background: #555; width: auto; padding: 8px 15px; float: right; margin-top: -50px; }
        .hidden-file-input { display: none; }
        
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { max-width: 80%; max-height: 80%; border-radius: 8px; }
        .modal-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        
        #loader { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px; color: #fff; z-index: 9999; }

        @media print {
            body { background: white; color: black; }
            body * { visibility: hidden; }
            .khata-list, .khata-list * { visibility: visible; color: black; }
            .khata-list { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
    <!-- FIREBASE CLOUD LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
</head>
<body oncontextmenu="return false;">

    <div id="loader">Saving to Cloud...</div>

    <div id="loginPage" class="login-container">
        <h2>Chakradhari Traders Login</h2>
        <select id="userRole" onchange="toggleRoleFields()">
            <option value="customer">Customer</option>
            <option value="owner">Owner</option>
        </select>
        <div id="phoneField"><input type="number" id="loginPhone" placeholder="Mobile Number"></div>
        <div id="passField" style="display: none;"><input type="password" id="loginPass" placeholder="Owner Password"></div>
        <button onclick="handleLogin()">System Me Ghusein 🔥</button>
    </div>

    <div id="mainDashboard" class="main-content">
        <header>
            <h1>Chakradhari Traders</h1>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </header>

        <div class="nav-tabs">
            <div id="tabShowroom" class="tab-btn active" onclick="switchTab('showroom')">🖼️ Showroom</div>
            <div id="tabKhata" class="tab-btn" onclick="switchTab('khata')" style="display: none;">📊 Khata</div>
        </div>

        <div id="showroomSection">
            <div class="controls">
                <select id="itemFilter" onchange="loadImagesUI()"></select>
            </div>
            <div class="image-grid" id="imageGrid"></div>
        </div>

        <div id="khataSection" style="display: none;">
            <div class="khata-grid">
                <div class="controls">
                    <h3>Naya Hisab</h3>
                    <input type="text" id="kName" placeholder="Naam">
                    <input type="number" id="kTotal" placeholder="Total">
                    <button onclick="saveKhataEntry()">Save</button>
                    <!-- PDF CONTROLS -->
                    <div style="margin-top: 20px;">
                        <h3>Date Range PDF</h3>
                        <input type="date" id="pdfStart"><input type="date" id="pdfEnd">
                        <button onclick="generateCustomPDF()" style="background: #FFC107; color: black;">Generate PDF</button>
                    </div>
                </div>
                <div class="khata-list" id="khataDisplay"></div>
            </div>
        </div>
    </div>

    <input type="file" id="replaceFileInput" class="hidden-file-input" accept="image/*" onchange="handleImageFileChange(event)">
    <script>
        // Security
        document.addEventListener('visibilitychange', () => { document.body.style.filter = document.hidden ? "blur(10px)" : "none"; });
        
        // Firebase Init
        const firebaseConfig = {
            apiKey: "AIzaSyDYuJJ1jbWF-NELI-B8BikkkVqdhMmklYw",
            authDomain: "chakradhari-traders.firebaseapp.com",
            databaseURL: "https://chakradhari-traders-default-rtdb.firebaseio.com",
            projectId: "chakradhari-traders",
            storageBucket: "chakradhari-traders.firebasestorage.app",
            messagingSenderId: "444707223808",
            appId: "1:444707223808:web:629ad531aeb3b94074dbe5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let loggedInRole = 'customer';

        function handleLogin() {
            const role = document.getElementById('userRole').value;
            if (role === 'owner') {
                if (document.getElementById('loginPass').value === 'Aditya930@') {
                    localStorage.setItem('isOwnerLoggedIn', 'true');
                    localStorage.setItem('ownerSessionExpire', Date.now() + 1800000);
                    location.reload();
                } else alert("Galat Password!");
            } else {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                loggedInRole = 'customer';
            }
        }

        function logout() {
            localStorage.setItem('isOwnerLoggedIn', 'false');
            location.reload();
        }

        function generateCustomPDF() {
            const start = document.getElementById('pdfStart').value;
            const end = document.getElementById('pdfEnd').value;
            if(!start || !end) return alert("Dates select karo.");
            window.print();
            window.location.href = `mailto:chakradhari2026@gmail.com?subject=Hisab ${start} to ${end}&body=Attached hisab details.`;
        }

        // Session Logic
        window.onload = function() {
            if(localStorage.getItem('isOwnerLoggedIn') === 'true' && Date.now() < parseInt(localStorage.getItem('ownerSessionExpire') || 0)) {
                loggedInRole = 'owner';
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                document.getElementById('tabKhata').style.display = 'block';
            }
        }

        function toggleRoleFields() {
            const role = document.getElementById('userRole').value;
            document.getElementById('phoneField').style.display = (role === 'owner') ? 'none' : 'block';
            document.getElementById('passField').style.display = (role === 'owner') ? 'block' : 'none';
        }
        
        function switchTab(tab) {
            document.getElementById('showroomSection').style.display = (tab === 'showroom') ? 'block' : 'none';
            document.getElementById('khataSection').style.display = (tab === 'khata') ? 'block' : 'none';
        }
    </script>
</body>
</html>
